<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::section})}">

<section>

<!-- BACKGROUND -->
<div class="success-bg"></div>
<div class="overlay"></div>

<div class="container d-flex justify-content-center align-items-center min-vh-100 px-3">

    <div class="card success-card text-center">

        <!-- SUCCESS ICON -->
        <div class="success-icon">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <!-- HEADER -->
        <h2 class="fw-bold text-success mt-3">Booking Confirmed</h2>
        <p class="text-muted">Your car has been successfully booked 🎉</p>

        <hr>

        <!-- BOOKING DETAILS -->
        <div class="text-start">

            <div class="detail-box">
                <span>Email</span>
                <strong th:text="${booking.userEmail}"></strong>
            </div>

            <div class="detail-box">
                <span>Car</span>
                <strong class="text-primary" th:text="${booking.carName}"></strong>
            </div>

            <div class="detail-box">
                <span>Pickup Location</span>
                <strong th:text="${booking.pickupLocation}"></strong>
            </div>

            <div class="row">
                <div class="col-6">
                    <div class="detail-box">
                        <span>Pickup Date</span>
                        <strong th:text="${booking.pickupDate}"></strong>
                    </div>
                </div>

                <div class="col-6">
                    <div class="detail-box">
                        <span>Return Date</span>
                        <strong th:text="${booking.returnDate}"></strong>
                    </div>
                </div>
            </div>

        </div>

        <hr>

        <!-- ACTION BUTTONS -->
        <div class="d-grid gap-2">

            <a href="/cars" class="btn btn-outline-primary rounded-3">
                🚗 Book Another Car
            </a>

            <a href="/user/bookings" class="btn btn-outline-dark rounded-3">
                📋 View My Bookings
            </a>

            <a href="/user/home" class="btn btn-success rounded-3 fw-semibold">
                🏠 Go to Home
            </a>

        </div>

    </div>

</div>

<style>

/* BACKGROUND */
.success-bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #11998e, #38ef7d);
    z-index: -2;
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* CARD */
.success-card {
    max-width: 500px;
    width: 100%;
    padding: 35px;
    border-radius: 25px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    box-shadow: 0 25px 70px rgba(0,0,0,0.3);
    animation: fadeIn 0.6s ease;
}

/* ICON */
.success-icon {
    font-size: 60px;
    color: #28a745;
    animation: pop 0.5s ease;
}

/* DETAILS */
.detail-box {
    display: flex;
    justify-content: space-between;
    background: #f8f9fa;
    padding: 10px 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 14px;
}

.detail-box span {
    color: #777;
}

/* BUTTON HOVER */
.btn:hover {
    transform: scale(1.03);
    transition: 0.3s;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes pop {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
}

</style>

</section>

</html>
