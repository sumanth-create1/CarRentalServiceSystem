<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::section})}">

<head>
    <title>Add Admin</title>
</head>

<body>

<section class="bg-light min-vh-100 d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg border-0 rounded-4 p-4 admin-card">

                    <!-- Header -->
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-user-shield fa-3x text-primary mb-2"></i>
                        <h3 class="fw-bold">Add New Admin</h3>
						<div th:if="${successMsg}" class="alert alert-success text-center">
						    [[${successMsg}]]
						</div>
                        <p class="text-muted">Create a new administrator account</p>
                    </div>

                    <!-- Form -->
                    <form action="/admin/save-admin" method="post" th:object="${user}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" th:field="*{fullname}" 
                                   class="form-control rounded-3" placeholder="Enter full name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" th:field="*{email}" 
                                   class="form-control rounded-3" placeholder="Enter email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" th:field="*{password}" 
                                   class="form-control rounded-3" placeholder="Enter password" required>
                        </div>

                        <button class="btn btn-primary w-100 py-2 rounded-3 fw-semibold">
                            Add Admin
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </div>

    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
        }

        .admin-card {
            transition: 0.3s ease;
        }

        .admin-card:hover {
            transform: translateY(-5px);
        }

        .form-control {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 5px rgba(13, 110, 253, 0.3);
        }

        button:hover {
            background-color: #0b5ed7;
        }
    </style>

</section>

</body>
</html>
