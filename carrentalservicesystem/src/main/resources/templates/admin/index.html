<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base ::layout(~{::section})}">

<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>

<section class="dashboard-section">

	<section class="dashboard-section d-flex align-items-center">

	    <div class="container text-center">

	        <!-- Title -->
	        <h1 class="fw-bold text-primary mb-2">
	            <i class="fa-solid fa-gauge-high me-2"></i> Admin Dashboard
	        </h1>

	        <p class="text-muted mb-5">Manage your car rental system efficiently</p>

	        <!-- Cards -->
	        <div class="row justify-content-center g-4">

	            <!-- Card -->
	            <div class="col-md-3 col-sm-6">
	                <a href="/admin/loadAddCar" class="text-decoration-none">
	                    <div class="card dashboard-card text-success">
	                        <i class="fa-solid fa-circle-plus"></i>
	                        <h5>Add Car</h5>
	                    </div>
	                </a>
	            </div>

	            <div class="col-md-3 col-sm-6">
	                <a href="/admin/category" class="text-decoration-none">
	                    <div class="card dashboard-card text-warning">
	                        <i class="fa-solid fa-table-cells-large"></i>
	                        <h5>Categories</h5>
	                    </div>
	                </a>
	            </div>

	            <div class="col-md-3 col-sm-6">
	                <a href="/admin/users" class="text-decoration-none">
	                    <div class="card dashboard-card text-primary">
	                        <i class="fa-solid fa-users"></i>
	                        <h5>Users</h5>
	                    </div>
	                </a>
	            </div>

	            <div class="col-md-3 col-sm-6">
	                <a href="/admin/car" class="text-decoration-none">
	                    <div class="card dashboard-card text-danger">
	                        <i class="fa-solid fa-car"></i>
	                        <h5>View Cars</h5>
	                    </div>
	                </a>
	            </div>

	            <div class="col-md-3 col-sm-6">
	                <a href="/admin/rentals" class="text-decoration-none">
	                    <div class="card dashboard-card text-dark">
	                        <i class="fa-solid fa-file-invoice-dollar"></i>
	                        <h5>Rentals</h5>
	                    </div>
	                </a>
	            </div>

	            <div class="col-md-3 col-sm-6">
	                <a href="/admin/add-admin" class="text-decoration-none">
	                    <div class="card dashboard-card text-info">
	                        <i class="fa-solid fa-user-plus"></i>
	                        <h5>Add Admin</h5>
	                    </div>
	                </a>
	            </div>

	        </div>
	    </div>

	</section>
	
	<style>
	body {
	    background: linear-gradient(135deg, #eef2f3, #dfe9f3);
	}

	.dashboard-section {
	    min-height: 90vh;
	}

	/* Card Design */
	.dashboard-card {
	    padding: 35px 20px;
	    border-radius: 20px;
	    border: none;
	    background: #ffffff;
	    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
	    transition: all 0.3s ease;
	}

	/* Icon */
	.dashboard-card i {
	    font-size: 40px;
	    margin-bottom: 15px;
	}

	/* Text */
	.dashboard-card h5 {
	    font-weight: 600;
	    margin-top: 10px;
	}

	/* Hover Effects */
	.dashboard-card:hover {
	    transform: translateY(-10px) scale(1.05);
	    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
	}

	/* Responsive spacing */
	@media (max-width: 768px) {
	    .dashboard-card {
	        padding: 25px 15px;
	    }
	}
	</style>
</section>




</body>
</html>
