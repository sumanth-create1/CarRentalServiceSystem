<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base ::layout(~{::section})}">

<head>
    <title>User Management</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
</head>

<body>

<section class="user-bg min-vh-100 py-5">

    <div class="container">

        <div class="card glass-card shadow-lg">

            <!-- HEADER -->
            <div class="card-header text-center">
                <h3 class="fw-bold mb-0">
                    <i class="fa-solid fa-users"></i> User Management
                </h3>

                <div th:if="${SuccessMsg}" class="alert alert-success mt-2">
                    [[${SuccessMsg}]]
                </div>

                <div th:if="${ErrorMsg}" class="alert alert-danger mt-2">
                    [[${ErrorMsg}]]
                </div>
            </div>

            <!-- TABLE -->
            <div class="card-body table-responsive">

                <table class="table table-hover align-middle text-center">

                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Profile</th>
                            <th>Name</th>
                            <th>City</th>
                            <th>Mobile</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="u,c:${users}">

                            <td>[[${c.count}]]</td>

                            <!-- PROFILE IMAGE -->
                            <td>
                                <img th:src="@{'/uploads/profile_img/' + ${u.profileImage}}"
                                     class="profile-img">
                            </td>

                            <td class="fw-semibold">[[${u.fullname}]]</td>
                            <td>[[${u.city}]]</td>
                            <td>[[${u.mobilenumber}]]</td>
                            <td>[[${u.email}]]</td>

                            <!-- STATUS BADGE -->
                            <td>
                                <span th:if="${u.isEnable}" class="badge bg-success">Active</span>
                                <span th:if="${!u.isEnable}" class="badge bg-danger">Inactive</span>
                            </td>

                            <!-- ACTION BUTTONS -->
                            <td>
                                <a th:href="@{'/admin/updateStatus?status=true&id=' + ${u.id}}"
                                   class="btn btn-sm btn-outline-success me-2">
                                    <i class="fa-solid fa-check"></i>
                                </a>

                                <a th:href="@{'/admin/updateStatus?status=false&id=' + ${u.id}}"
                                   class="btn btn-sm btn-outline-danger">
                                    <i class="fa-solid fa-ban"></i>
                                </a>
                            </td>

                        </tr>
                    </tbody>

                </table>

            </div>
        </div>

    </div>
	

	<!-- 🔥 CUSTOM CSS -->
	<style>

	.user-bg {
	    background: linear-gradient(135deg, #eef2f3, #dfe9f3);
	}

	.glass-card {
	    border-radius: 20px;
	    background: rgba(255, 255, 255, 0.9);
	    backdrop-filter: blur(10px);
	    border: none;
	    transition: 0.3s;
	}

	.glass-card:hover {
	    transform: translateY(-5px);
	}

	/* Profile Image */
	.profile-img {
	    width: 60px;
	    height: 60px;
	    border-radius: 50%;
	    object-fit: cover;
	    border: 3px solid #0d6efd;
	    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
	}

	/* Hover Effect */
	table tbody tr:hover {
	    background-color: #f1f5ff;
	}

	/* Buttons */
	.btn-outline-success:hover {
	    background-color: #198754;
	    color: white;
	}

	.btn-outline-danger:hover {
	    background-color: #dc3545;
	    color: white;
	}

	</style>

</section>


</body>
</html>
