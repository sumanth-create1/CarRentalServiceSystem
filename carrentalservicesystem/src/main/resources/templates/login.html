<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::section})}">

<head>
    <title>Login - Car Rental</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<section class="login-container">

	<div class="left-panel p-0 position-relative">

	    <!-- 🔥 Dark Color Carousel -->
	    <div id="loginCarousel" class="carousel slide h-100 w-100"
	         data-bs-ride="carousel" data-bs-interval="3000">

	        <div class="carousel-inner h-100">

	            <div class="carousel-item active h-100 bg-slide-1"></div>
	            <div class="carousel-item h-100 bg-slide-2"></div>
	            <div class="carousel-item h-100 bg-slide-3"></div>

	        </div>
	    </div>

	    <!-- 🔥 Text Overlay -->
	    <div class="carousel-caption-custom">
	        <h1>Car Rental System 🚗</h1>
	        <p>Book your dream ride in seconds<br>Fast • Safe • Reliable</p>
	    </div>

	</div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">

        <div class="card login-card">

            <h3 class="text-center mb-4 fw-bold">
                Login
            </h3>

            <!-- Error -->
            <div th:if="${param.error}" class="alert alert-danger text-center">
                Invalid username or password
            </div>

            <!-- Logout -->
            <div th:if="${param.logout}" class="alert alert-success text-center">
                Logged out successfully
            </div>

            <form action="/login" method="post">

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="text" class="form-control"
                           name="username"
                           placeholder="Enter email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control"
                           name="password"
                           placeholder="Enter password" required>
                </div>

                <div class="d-flex justify-content-between mb-3">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" name="remember-me">
                        <label class="form-check-label">Remember me</label>
                    </div>
                    <a href="#" class="text-decoration-none">Forgot?</a>
                </div>

                <button class="btn btn-primary w-100">
                    Sign In
                </button>

            </form>

            <p class="text-center mt-3 mb-0">
                Don't have an account?
                <a href="/register" class="text-decoration-none fw-bold">Register</a>
            </p>

        </div>

    </div>
	

	<style>
	    body {
	        background: #f4f6f9;
	    }

	    .login-container {
	        min-height: 100vh;
	        display: flex;
	    }

		.left-panel {
		    position: relative;
		    flex: 1;
		    overflow: hidden;
		}

		/* Each slide as pure dark gradient */
		.bg-slide-1,
		.bg-slide-2,
		.bg-slide-3 {
		    height: 100vh;
		    width: 100%;
		}

		/* Different dark themes */
		.bg-slide-1 {
		    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
		}

		.bg-slide-2 {
		    background: linear-gradient(135deg, #000000, #434343);
		}

		.bg-slide-3 {
		    background: linear-gradient(135deg, #141e30, #243b55);
		}

		/* Text overlay */
		.carousel-caption-custom {
		    position: absolute;
		    top: 50%;
		    left: 50%;
		    transform: translate(-50%, -50%);
		    text-align: center;
		    color: white;
		    z-index: 2;
		    width: 80%;
		}

		.carousel-caption-custom h1 {
		    font-size: 42px;
		    font-weight: 700;
		    letter-spacing: 1px;
		}

		.carousel-caption-custom p {
		    font-size: 18px;
		    opacity: 0.85;
		}
	    /* RIGHT SIDE */
	    .right-panel {
	        flex: 1;
	        display: flex;
	        align-items: center;
	        justify-content: center;
	        padding: 30px;
	    }

	    .login-card {
	        width: 100%;
	        max-width: 400px;
	        border: none;
	        border-radius: 15px;
	        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
	        padding: 30px;
	        background: #fff;
	    }

	    .form-control {
	        border-radius: 10px;
	        padding: 10px;
	    }

	    .btn-primary {
	        border-radius: 10px;
	        padding: 10px;
	        font-weight: 600;
	        background: #4e54c8;
	        border: none;
	    }

	    .btn-primary:hover {
	        background: #3b40a4;
	    }

	    /* Mobile Responsive */
	    @media (max-width: 768px) {
	        .login-container {
	            flex-direction: column;
	        }

	        .left-panel {
	            height: 250px;
	        }
	    }
	</style>

</section>

</body>
</html>
